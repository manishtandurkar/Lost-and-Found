name: Build APK & Create Release

on:
  push:
    branches: [ main, "claude/**" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Create google-services.json placeholder
        env:
          GOOGLE_SERVICES_JSON: |
            {
              "project_info": {
                "project_number": "000000000000",
                "project_id": "lost-and-found-placeholder",
                "storage_bucket": "lost-and-found-placeholder.appspot.com"
              },
              "client": [
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                    "android_client_info": {
                      "package_name": "com.example.lostandfound"
                    }
                  },
                  "oauth_client": [],
                  "api_key": [
                    {
                      "current_key": "PLACEHOLDER_API_KEY"
                    }
                  ],
                  "services": {
                    "appinvite_service": {
                      "other_platform_oauth_client": []
                    }
                  }
                }
              ],
              "configuration_version": "1"
            }
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8"

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lost-and-found-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Create google-services.json placeholder
        env:
          GOOGLE_SERVICES_JSON: |
            {
              "project_info": {
                "project_number": "000000000000",
                "project_id": "lost-and-found-placeholder",
                "storage_bucket": "lost-and-found-placeholder.appspot.com"
              },
              "client": [
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                    "android_client_info": {
                      "package_name": "com.example.lostandfound"
                    }
                  },
                  "oauth_client": [],
                  "api_key": [
                    {
                      "current_key": "PLACEHOLDER_API_KEY"
                    }
                  ],
                  "services": {
                    "appinvite_service": {
                      "other_platform_oauth_client": []
                    }
                  }
                }
              ],
              "configuration_version": "1"
            }
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8"

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*= *"\(.*\)".*/\1/')
          echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v${VERSION}-$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Lost & Found ${{ steps.version.outputs.VERSION_NAME }}"
          body: |
            ## Lost & Found Android App

            ### Features
            - Google Sign-In with college domain restriction
            - Real-time Firebase feed for lost/found items
            - Offline support via Room SQLite cache
            - Google Maps for item locations
            - In-app chat between users
            - Push notifications via Firebase Cloud Messaging
            - Smart category-based item matching

            > **Note:** This build uses a placeholder `google-services.json`.
            > Replace it with your real Firebase credentials before using the app.
          files: app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
